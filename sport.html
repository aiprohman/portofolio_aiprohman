<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport - AIPROHMAN Portofolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- PENGATURAN DASAR --- */
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 0; background-color: #0f1115; color: white; overflow-x: hidden;
        }

        /* --- NAVIGASI ATAS --- */
        .nav-header {
            position: absolute; top: 0; left: 0; width: 100%; padding: 20px 5%;
            display: flex; justify-content: space-between; align-items: center;
            box-sizing: border-box; z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        .logo { font-weight: 800; font-size: 1.5rem; letter-spacing: 2px; }
        .back-btn { 
            color: white; text-decoration: none; font-weight: 700; font-size: 0.9rem;
            transition: color 0.3s; display: flex; align-items: center; gap: 5px;
        }
        .back-btn:hover { color: #d92027; }

        /* --- LAYAR BESAR (HERO SECTION KHUSUS VIDEO) --- */
        .hero-showcase {
            height: 75vh; background-size: cover; background-position: center;
            position: relative; display: flex; align-items: flex-end; padding: 50px 5%;
            transition: background-image 0.3s ease-in-out; 
            background-image: url('sport/Foto-sport-cover1.jpg'); 
        }
        .hero-showcase::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, #0f1115 0%, rgba(15,17,21,0.5) 50%, transparent 100%);
            z-index: 1;
        }
        .hero-content { position: relative; z-index: 2; max-width: 800px; }
        .kategori-tag {
            background-color: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 20px; 
            font-size: 0.8rem; font-weight: 700; display: inline-block; margin-bottom: 15px; letter-spacing: 1px;
        }
        .hero-title { font-size: 4rem; font-weight: 800; margin: 0 0 10px 0; text-transform: uppercase; text-shadow: 2px 2px 10px rgba(0,0,0,0.8);}
        .hero-desc { font-size: 1.1rem; color: #ddd; margin-bottom: 30px; line-height: 1.6; text-shadow: 1px 1px 5px rgba(0,0,0,0.8);}
        
        .play-btn {
            background-color: white; color: black; font-weight: 800; font-size: 1.2rem;
            padding: 15px 40px; border: none; border-radius: 5px; cursor: pointer;
            display: flex; align-items: center; gap: 10px; transition: 0.3s;
        }
        .play-btn:hover { background-color: #d92027; color: white; transform: scale(1.05); }

        /* --- BAGIAN 1: SLIDER COVER VIDEO (SAMPING) --- */
        .thumbnail-section {
            padding: 20px 5% 40px 5%; position: relative; z-index: 5;
        }
        .section-atas { margin-top: -50px; } 
        .thumbnail-section h3 { font-size: 1.2rem; margin-bottom: 20px; letter-spacing: 1px; color: #fff;}
        .thumbnail-section h3 span { font-size: 0.8rem; color: #888; font-weight: 400; margin-left: 10px; }

        .row-geser {
            display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px;
            scroll-behavior: smooth; scrollbar-width: none; flex-wrap: nowrap;
        }
        .row-geser::-webkit-scrollbar { display: none; }

        .video-card {
            flex: 0 0 auto; width: 220px; height: 130px; border-radius: 8px; overflow: hidden; 
            cursor: pointer; position: relative; transition: 0.3s; border: 2px solid transparent;
        }
        .video-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .video-card:hover { transform: scale(1.05); z-index: 10; }
        .video-card.active { border: 3px solid white; transform: scale(1.05); z-index: 10; }
        .video-card.active img { opacity: 0.7; }

        /* --- BAGIAN 2: MASONRY GALLERY (PINTEREST STYLE) --- */
        .masonry-gallery {
            column-count: 4; 
            column-gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .photo-box {
            break-inside: avoid; 
            margin-bottom: 15px;
            border-radius: 8px; overflow: hidden; cursor: pointer; position: relative;
        }
        .photo-box img { 
            width: 100%; height: auto; display: block; transition: transform 0.4s ease, filter 0.4s ease; 
        }
        .photo-box:hover img { transform: scale(1.05); filter: brightness(0.7); }

        /* --- POPUP MODALS --- */
        .video-modal, .photo-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.95); z-index: 1000; display: none; 
            justify-content: center; align-items: center;
        }
        .video-content { width: 90%; max-width: 1000px; position: relative; }
        #player { width: 100%; aspect-ratio: 16 / 9; border-radius: 10px; border: none; background-color: black; }
        .photo-modal img { max-width: 80%; max-height: 90vh; border-radius: 8px; object-fit: contain; transition: opacity 0.3s ease; }
        .close-btn { position: absolute; top: 20px; right: 40px; color: white; font-size: 2.5rem; cursor: pointer; font-weight: bold; z-index: 1002; }
        
        .modal-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            color: white; font-size: 3rem; font-weight: bold; cursor: pointer;
            user-select: none; transition: color 0.3s; z-index: 1001; padding: 20px; 
            text-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }
        .left-nav { left: 30px; }
        .right-nav { right: 30px; }

        @media (max-width: 768px) {
            .hero-showcase { height: 60vh; padding-bottom: 50px; justify-content: flex-start; }
            .hero-title { font-size: 1.6rem; }
            .video-card { width: 110px; height: 65px; }
            .masonry-gallery { column-count: 3; column-gap: 5px; } 
            .modal-nav { font-size: 2rem; }
            .left-nav { left: 5px; }
            .right-nav { right: 5px; }
        }
    </style>
</head>
<body>

    <header class="nav-header">
        <div class="logo">AIPROHMAN</div>
        <a href="index.html" class="back-btn">&#8592; KEMBALI</a>
    </header>

    <section class="hero-showcase" id="main-display">
        <div class="hero-content">

        <div class="row-geser" id="thumb-container">
            <div class="video-card active" data-image="sport/Foto-sport-cover1.jpg" data-video="https://www.youtube.com/embed/YokwXwv7kQo" data-title="Fun Run Bank Indonesia 2025" data-desc="Event Fun Run yang diadakan oleh Bank Indonesia Jakarta">

            </div>
            <div class="video-card" data-image="sport/Foto-sport-cover4.jpg" data-video="https://www.youtube.com/embed/95yaecB74xw" data-title="WCS x Bogor Runners" data-desc="Event Fun Run yang diadakan oleh WCS bersama Bogor Runners">
                <img src="sport/Foto-sport-cover4.jpg" alt="4">
            </div>
            <div class="video-card" data-image="sport/Foto-sport-cover5.jpg" data-video="https://www.youtube.com/embed/hjYeM5sg-1k" data-title="Kahf x Bogor Runners" data-desc="Event Fun Run yang diadakan oleh Kahf bersama Bogor Runners">
                <img src="sport/Foto-sport-cover5.jpg" alt="5">
            </div>
            <div class="video-card" data-image="sport/Foto-sport-cover6.jpg" data-video="https://www.youtube.com/embed/0jyi6qM9BsU" data-title="Lari Santai Spotec" data-desc="Promosi Sepatu Lari Spotec bersama Bogor Runners">
                <img src="sport/Foto-sport-cover6.jpg" alt="6">
            </div>
            <div class="video-card" data-image="sport/Foto-sport-cover7.jpg" data-video="https://www.youtube.com/embed/4sq9MF-TXyo" data-title="Mantra 116 2024" data-desc="Event Trail Run Internasional">

            <div class="video-card" data-image="sport/Foto-sport-cover8.jpg" data-video="https://www.youtube.com/embed/0lp0HpLkeLY" data-title="IPB Half Marathon 2024" data-desc="Event Lari Nasional yang diadakan oleh IPB">

                <img src="sport/Foto-sport-cover9.jpg" alt="9">
            </div>
            <div class="video-card" data-image="sport/Foto-sport-cover10.jpg" data-video="https://www.youtube.com/embed/yYc8We2l15A" data-title="Fun Zumba Bank Indonesia 2024" data-desc="Event Fun Zumba yang diadakan oleh Bank Indonesia Jakarta">
                <img src="sport/Foto-sport-cover10.jpg" alt="10">
            </div>
        </div>

    <section class="thumbnail-section">
        <h3>Galeri Foto Sport</h3>
        <div class="masonry-gallery">
            <div class="photo-box"><img src="sport/Foto-sport1.jpg"></div>
            <div class="photo-box"><img src="sport/Foto-sport2.jpg"></div>
            <div class="photo-box"><img src="sport/Foto-sport3.jpg"></div>
            <div class="photo-box"><img src="sport/Foto-sport4.jpg"></div>
            <div class="photo-box"><img src="sport/Foto-sport5.jpg"></div>
            <div class="photo-box"><img src="sport/Foto-sport6.jpg"></div>
            <div class="photo-box"><img src="sport/Foto-sport7.jpg"></div>
            <div class="photo-box"><img src="sport/Foto-sport8.jpg"></div>
            <div class="photo-box"><img src="sport/Foto-sport9.jpg"></div>
            <div class="photo-box"><img src="sport/Foto-sport10.jpg"></div>
            <div class="photo-box"><img src="sport/Foto-sport11.jpg"></div>
            <div class="photo-box"><img src="sport/Foto-sport12.jpg"></div>
            <div class="photo-box"><img src="sport/Foto-sport13.jpg"></div>
            <div class="photo-box"><img src="sport/Foto-sport14.jpg"></div>
            <div class="photo-box"><img src="sport/Foto-sport15.jpg"></div>
            <div class="photo-box"><img src="sport/Foto-sport16.jpg"></div>
            <div class="photo-box"><img src="sport/Foto-sport17.jpg"></div>
            <div class="photo-box"><img src="sport/Foto-sport18.jpg"></div>
            <div class="photo-box"><img src="sport/Foto-sport19.jpg"></div>
            <div class="photo-box"><img src="sport/Foto-sport20.jpg"></div>
            <div class="photo-box"><img src="sport/Foto-sport21.jpg"></div>
            <div class="photo-box"><img src="sport/Foto-sport22.jpg"></div>
        </div>

    <div class="video-modal" id="video-modal">
        <div class="video-content">
            <span class="close-btn" id="close-video-modal" style="top:-40px; right:0;">&times;</span>
            <iframe id="player" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
        </div>
    </div>

    <div class="photo-modal" id="photo-modal">
        <span class="close-btn" id="close-photo-modal">&times;</span>
        <span class="modal-nav left-nav" id="prev-photo">&#10094;</span> 
        <img src="" id="photo-modal-img">
        <span class="modal-nav right-nav" id="next-photo">&#10095;</span> 
    </div>

    <script>
        const mainDisplay = document.getElementById('main-display');
        const displayTitle = document.getElementById('display-title');
        const displayDesc = document.getElementById('display-desc');
        const videoCards = document.querySelectorAll('.video-card');
        const player = document.getElementById('player');
        const videoModal = document.getElementById('video-modal');

        let currentVideoIndex = 0;
        let currentVideoSrc = "https://www.youtube.com/embed/YokwXwv7kQo";

        function gantiVideoUtama(index) {
            document.querySelector('.video-card.active').classList.remove('active');
            const card = videoCards[index];
            card.classList.add('active');
            mainDisplay.style.backgroundImage = `url('${card.getAttribute('data-image')}')`;
            displayTitle.textContent = card.getAttribute('data-title');
            displayDesc.textContent = card.getAttribute('data-desc');
            currentVideoSrc = card.getAttribute('data-video');
            card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }

        videoCards.forEach((card, index) => {
            card.addEventListener('click', function() {
                currentVideoIndex = index;
                gantiVideoUtama(currentVideoIndex);
                window.scrollTo({ top: 0, behavior: 'smooth' }); 
            });
        });

        // SWIPE HERO
        let heroStart = 0;
        mainDisplay.addEventListener('touchstart', e => heroStart = e.changedTouches[0].screenX, {passive: true});
        mainDisplay.addEventListener('touchend', e => {
            let jarak = heroStart - e.changedTouches[0].screenX;
            if (jarak > 50) { currentVideoIndex = (currentVideoIndex + 1) % videoCards.length; gantiVideoUtama(currentVideoIndex); }
            else if (jarak < -50) { currentVideoIndex = (currentVideoIndex - 1 + videoCards.length) % videoCards.length; gantiVideoUtama(currentVideoIndex); }
        }, {passive: true});

        document.getElementById('play-btn').addEventListener('click', () => { if(currentVideoSrc) { player.src = currentVideoSrc + "?autoplay=1"; videoModal.style.display = 'flex'; } });
        document.getElementById('close-video-modal').addEventListener('click', () => { videoModal.style.display = 'none'; player.src = ""; });

        // LIGHTBOX
        const photoModal = document.getElementById('photo-modal');
        const photoModalImg = document.getElementById('photo-modal-img');
        const photoBoxes = document.querySelectorAll('.photo-box img');
        let currentPhotoIndex = 0;

        photoBoxes.forEach((img, index) => {
            img.parentElement.addEventListener('click', () => {
                currentPhotoIndex = index;
                photoModalImg.src = img.src;
                photoModal.style.display = 'flex';
            });
        });

        function gantiFoto(index) {
            if (index < 0) currentPhotoIndex = photoBoxes.length - 1; 
            else if (index >= photoBoxes.length) currentPhotoIndex = 0; 
            else currentPhotoIndex = index;
            photoModalImg.style.opacity = 0.5;
            setTimeout(() => { photoModalImg.src = photoBoxes[currentPhotoIndex].src; photoModalImg.style.opacity = 1; }, 150);
        }

        document.getElementById('prev-photo').addEventListener('click', (e) => { e.stopPropagation(); gantiFoto(currentPhotoIndex - 1); });
        document.getElementById('next-photo').addEventListener('click', (e) => { e.stopPropagation(); gantiFoto(currentPhotoIndex + 1); });
        document.getElementById('close-photo-modal').addEventListener('click', () => photoModal.style.display = 'none');

        // SWIPE GALLERY
        let photoStart = 0;
        photoModal.addEventListener('touchstart', e => photoStart = e.changedTouches[0].screenX, {passive: true});
        photoModal.addEventListener('touchend', e => {
            let jarak = photoStart - e.changedTouches[0].screenX;
            if (jarak > 50) gantiFoto(currentPhotoIndex + 1);
            else if (jarak < -50) gantiFoto(currentPhotoIndex - 1);
        }, {passive: true});

        window.onclick = e => { if(e.target === videoModal || e.target === photoModal) { videoModal.style.display = 'none'; photoModal.style.display = 'none'; player.src = ""; } };
    </script>
</body>
</html>
