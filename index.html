        .hero-section { background: transparent; min-height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 30px 5%; position: relative; z-index: 2; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; }

        .menu a { 
            color: white; 
            text-decoration: none; 
            text-transform: uppercase; 
            transition: all 0.3s ease; 
            cursor: pointer; 
            display: inline-block;
        }
        /* Efek Hover Menu yang Sempat Macet */
        .menu a:hover { 
            color: #d92027 !important;

        }

        .btn-merah { 
            background-color: #d92027; 
            padding: 10px 25px; 
            border-radius: 20px; 
            color: white !important; 
            font-weight: 800; 
            text-decoration: none; 
            transition: 0.3s; 
        }
        .btn-merah:hover { background-color: #a7181d; transform: scale(1.05); color: white !important; }

        /* --- TEKS UTAMA DENGAN ANIMASI GERAK --- */
        .hero-center { 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            flex-grow: 1; 
            margin: 40px 0; 
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .teks-utama h2 { 
            font-size: 1.2rem; 
            letter-spacing: 5px; 
            margin-bottom: -10px; 
            color: #eee;
            animation: fadeInUp 1s ease-out forwards;
            animation-delay: 0.3s;
            opacity: 0;
        }

        .teks-utama h1 { 
            font-size: 6.5rem; 
            font-weight: 800; 
            margin: 0; 
            letter-spacing: 5px; 
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
            animation: fadeInUp 1.2s ease-out forwards;
            animation-delay: 0.6s;
            opacity: 0;
        }

        /* --- REVIEW PHOTO / CAROUSEL --- */
        .review-section { text-align: center; padding: 0 20px; background: transparent; position: relative; z-index: 2; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .review-section h2 { font-size: 1.8rem; margin-bottom: 40px; letter-spacing: 4px; color: #fff; }
        .carousel-wrapper { display: flex; align-items: center; justify-content: center; position: relative; max-width: 1100px; margin: 0 auto; }
        .carousel-container { display: flex; gap: 25px; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; padding: 40px 20px; align-items: center; scrollbar-width: none; }
        .carousel-container::-webkit-scrollbar { display: none; }
        
        .carousel-item { 
            flex: 0 0 auto; width: 250px; height: 350px; scroll-snap-align: center; 
            border-radius: 12px; background-color: #333; background-size: cover; 
            background-position: center; position: relative; text-decoration: none; 
            transition: 0.5s ease-in-out; box-shadow: 0 15px 30px rgba(0,0,0,0.6); opacity: 0.7; 
        }
        .carousel-item:hover { transform: scale(1.05); opacity: 1; z-index: 10; }
        .label-merah { background-color: #d92027; color: white; font-size: 0.75rem; font-weight: bold; padding: 6px 12px; position: absolute; top: 20px; left: 50%; transform: translateX(-50%); border-radius: 4px; pointer-events: none; }
        
        .arrow { font-size: 3rem; font-weight: bold; cursor: pointer; margin: 0 15px; color: white; transition: 0.3s; user-select: none; }
        .arrow:hover { color: #d92027; }

        /* --- CONTACT SECTION --- */
        .contact-section { padding: 80px 5%; background-color: #0a0e10; text-align: center; position: relative; z-index: 5; }
        .contact-section h3 { font-size: 1.2rem; letter-spacing: 3px; color: #666; margin-bottom: 50px; }
        .logo-perusahaan { display: flex; justify-content: center; align-items: center; gap: 20px; row-gap: 30px; flex-wrap: wrap; max-width: 1200px; margin: 0 auto 80px auto; }
        .logo-perusahaan img { width: 180px; height: 80px; object-fit: contain; opacity: 0.5; filter: brightness(0) invert(1); transition: 0.3s; }
        
        .contact-box h2 { font-size: 2.5rem; margin-bottom: 30px; }
        .btn-putih { border: 2px solid white; padding: 10px 25px; border-radius: 20px; color: white; font-weight: 800; text-decoration: none; transition: 0.3s; margin-left: 15px; display: inline-block; }
        .btn-putih:hover { background-color: white; color: #12181b; }
        
        .sosmed-link { display: flex; justify-content: center; gap: 25px; margin-top: 40px; }
        .sosmed-link a { color: #888; text-decoration: none; font-weight: 700; font-size: 0.9rem; transition: 0.3s; }
        .sosmed-link a:hover { color: #d92027; }

        /* --- MOBILE OPTIMIZATION --- */
        @media (max-width: 768px) {
            .nav-bar { padding: 10px; flex-direction: column; }
            .menu { gap: 10px; flex-wrap: wrap; justify-content: center; }
            .teks-utama h1 { font-size: 2.5rem; }
            .carousel-item { width: 180px; height: 260px; opacity: 1; }
            .logo-perusahaan img { width: 100px; }
        }
    </style>

    <script>
        const wadahGeser = document.getElementById('galeri-geser');
        const tombolKiri = document.getElementById('btn-kiri');
        const tombolKanan = document.getElementById('btn-kanan');

        tombolKanan.onclick = () => { wadahGeser.scrollBy({ left: 300, behavior: 'smooth' }); };
        tombolKiri.onclick = () => { wadahGeser.scrollBy({ left: -300, behavior: 'smooth' }); };

        if (window.innerWidth > 768) {
            const slideData = {
                'card-event': ['event/Foto-cover1.jpg', 'event/Foto-cover2.jpg', 'event/Foto-cover3.jpg'],
                'card-corporate': ['corporate/Foto-corporate-cover1.jpg', 'corporate/Foto-corporate-cover2.jpg', 'corporate/Foto-corporate-cover3.jpg'],
                'card-sport': ['sport/Foto-sport-cover1.jpg', 'sport/Foto-sport-cover2.jpg', 'sport/Foto-sport-cover3.jpg'],
                'card-competition': ['competition/Foto-competition-cover1.jpg', 'competition/Foto-competition-cover2.jpg', 'competition/Foto-competition-cover3.jpg'],
                'card-birthday': ['birthday/Foto-birthday-cover1.jpg', 'birthday/Foto-birthday-cover2.jpg', 'birthday/Foto-birthday-cover3.jpg'],
                'card-wedding': ['wedding/Foto-wedding-cover1.jpg', 'wedding/Foto-wedding-cover2.jpg', 'wedding/Foto-wedding-cover3.jpg'],
                'card-graduation': ['graduation/Foto-graduation-cover1.jpg', 'graduation/Foto-graduation-cover2.jpg', 'graduation/Foto-graduation-cover3.jpg'],
                'card-other': ['other/Foto-other-cover1.jpg', 'other/Foto-other-cover2.jpg', 'other/Foto-other-cover3.jpg']
            };

            let currentIdx = 0;
            setInterval(() => {
                currentIdx = (currentIdx + 1) % 3;
                for (const id in slideData) {
                    const el = document.getElementById(id);
                    if (el) el.style.backgroundImage = `url('${slideData[id][currentIdx]}')`;
                }
            }, 3500);
        }

        function keContact() {
            document.getElementById("target-kontak").scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    </script>
