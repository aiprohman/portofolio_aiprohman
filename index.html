<html lang="id">
<head>
    <meta charset="UTF-8">

    <title>AIPROHMAN - Portofolio</title>
    <style>
        /* --- PENGATURAN DASAR --- */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap');

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 0;
            background-color: #12181b; 
            color: white;
            overflow-x: hidden;
        }

        /* --- WRAPPER BACKGROUND UTAMA --- */
        .top-wrapper {
            background: linear-gradient(to bottom, rgba(18, 24, 27, 0.6) 0%, rgba(18, 24, 27, 0.85) 60%, #0a0e10 100%), 
                        url('backround/bg-utama1.jpg') center/cover no-repeat; 
            transition: background 1.5s ease-in-out; 
            position: relative;
            width: 100%;
        }

        .top-wrapper::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiNmZmZmZmYiIGZpbGwtb3BhY2l0eT0iMC4wMyI+PHBhdGggZD0iMTAgMGg0MHY0MEgwVjB6bTIwIDIwaDIwdjIwSDIwVjIwek0wIDIwaDIwdjIwSDBWMjB6bTIwIDBIMHYyMGgyMFYyMHoiLz48L2c+PC9nPjwvc3ZnPg==') repeat;
            opacity: 0.5; z-index: 1; pointer-events: none;
        }

        /* --- HERO SECTION & NAVIGASI --- */
        .hero-section {
            background: transparent; min-height: 100vh;
            display: flex; flex-direction: column;
            justify-content: space-between; padding: 30px 5%; 
            position: relative; z-index: 2; 
        }

        .nav-bar { display: flex; justify-content: space-between; align-items: center; }
        .menu { display: flex; gap: 30px; align-items: center; font-size: 0.8rem; font-weight: 700; }
        .menu a { color: white; text-decoration: none; text-transform: uppercase; transition: color 0.3s; }
        .menu a:hover { color: #d92027; }
        
        .btn-merah { 
            background-color: #d92027; padding: 10px 25px; border-radius: 20px; 
            color: white !important; font-weight: 800; text-decoration: none; transition: 0.3s;
        }
        .btn-merah:hover { background-color: #a7181d; transform: scale(1.05); }

        .hero-center { text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-grow: 1; margin: 40px 0; }
        
        .teks-utama h2 { 
            font-size: 1.2rem; letter-spacing: 5px; margin-bottom: -10px; color: #eee; 
            opacity: 0; animation: munculKeAtas 1.5s forwards; animation-delay: 0.2s; 
        }
        .teks-utama h1 { 
            font-size: 6.5rem; font-weight: 800; margin: 0; letter-spacing: 5px; 
            text-shadow: 0 5px 15px rgba(0,0,0,0.5); 
            opacity: 0; animation: munculKeBawah 1.5s forwards; animation-delay: 0.2s;
        }

        @keyframes munculKeAtas { 0% { opacity: 0; transform: translateY(40px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes munculKeBawah { 0% { opacity: 0; transform: translateY(-40px); } 100% { opacity: 1; transform: translateY(0); } }

        /* --- REVIEW PHOTO --- */
        .review-section { 
            text-align: center; padding: 0 20px; background: transparent; 
            position: relative; z-index: 2; min-height: 100vh; 
            display: flex; flex-direction: column; justify-content: center; 
        }
        .review-section h2 { font-size: 1.8rem; margin-bottom: 40px; letter-spacing: 4px; color: #fff; }

        .carousel-wrapper { display: flex; align-items: center; justify-content: center; position: relative; max-width: 1100px; margin: 0 auto; }
        .carousel-container {
            display: flex; gap: 25px; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth;
            padding: 40px 20px; align-items: center; scrollbar-width: none;
        }
        .carousel-container::-webkit-scrollbar { display: none; }

        .carousel-item {
            flex: 0 0 auto; width: 250px; height: 350px; 
            scroll-snap-align: center; border-radius: 12px;
            background-color: #333; background-size: cover; background-position: center; position: relative;
            text-decoration: none; transition: 0.4s ease; box-shadow: 0 15px 30px rgba(0,0,0,0.6); 
            opacity: 0.6; 
        }
        .carousel-item:hover { transform: scale(1.05); opacity: 1; z-index: 10; }

        .label-merah {
            background-color: #d92027; color: white; font-size: 0.75rem; font-weight: bold;
            padding: 6px 12px; position: absolute; top: 20px; left: 50%; transform: translateX(-50%); border-radius: 4px;
        }
        
        .arrow { font-size: 3rem; font-weight: bold; cursor: pointer; margin: 0 15px; color: white; transition: 0.3s; }
        .arrow:hover { color: #d92027; }

        /* --- CONTACT SECTION --- */
        .contact-section { padding: 80px 5%; background-color: #0a0e10; text-align: center; position: relative; z-index: 5; scroll-margin-top: 80px;}
        .contact-section h3 { font-size: 1.2rem; letter-spacing: 3px; color: #666; margin-bottom: 50px; }

        .logo-perusahaan { 
            display: flex; justify-content: center; align-items: center; gap: 20px; row-gap: 30px; flex-wrap: wrap; 
            margin-bottom: 80px; max-width: 1200px; margin: 0 auto 80px auto;
        }
        .logo-perusahaan img { width: 180px; height: 80px; object-fit: contain; opacity: 0.65; filter: brightness(0) invert(1); }

        .contact-box h2 { font-size: 2.5rem; margin-bottom: 30px; }
        .btn-putih { 
            border: 2px solid white; padding: 10px 25px; border-radius: 20px; color: white; 
            font-weight: 800; text-decoration: none; transition: 0.3s; margin-left: 15px; display: inline-block;
        }
        .btn-putih:hover { background-color: white; color: #12181b; }

        .sosmed-link { display: flex; justify-content: center; gap: 25px; margin-top: 40px; }
        .sosmed-link a { color: #888; text-decoration: none; font-weight: 700; font-size: 0.9rem; transition: 0.3s; }
        .sosmed-link a:hover { color: #d92027; }

        /* --- PENGATURAN HP (MOBILE) --- */
        @media (max-width: 768px) {
            .nav-bar { padding: 20px 5% 10px 5%; flex-direction: column; align-items: center; }
            .menu { flex-wrap: wrap; justify-content: center; gap: 15px 20px; font-size: 0.8rem; width: 100%; }
            .menu a.btn-merah { display: none !important; }

            .hero-section { padding: 0; min-height: auto; justify-content: flex-start; }
            .hero-center { margin-top: 100px; margin-bottom: 50px; }
            .teks-utama h1 { font-size: 2.2rem; }

            .review-section { padding: 40px 0 60px 0; min-height: auto; display: block; }
            .review-section h2 { font-size: 0.8rem; }
            .carousel-item { width: 115px; height: 180px; opacity: 1 !important; }

            /* Perbaikan posisi scroll Contact */
            .contact-section { scroll-margin-top: 30px; }
            .logo-perusahaan { margin-bottom: 40px !important; }
            .logo-perusahaan img { width: 85px; height: 40px; } 
            .contact-box h2 { font-size: 1.6rem; }
            .contact-box .btn-merah, .contact-box .btn-putih { display: block; margin: 15px auto; width: 80%; padding: 14px 0; }
        }
    </style>
</head>
