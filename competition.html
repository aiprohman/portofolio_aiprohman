<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Competition - AIPROHMAN Portofolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- PENGATURAN DASAR --- */
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 0; background-color: #0f1115; color: white; overflow-x: hidden;
        }

        /* --- NAVIGASI ATAS --- */
        .nav-header {
            position: absolute; top: 0; left: 0; width: 100%; padding: 20px 5%;
            display: flex; justify-content: space-between; align-items: center;
            box-sizing: border-box; z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        .logo { font-weight: 800; font-size: 1.5rem; letter-spacing: 2px; }
        .back-btn { 
            color: white; text-decoration: none; font-weight: 700; font-size: 0.9rem;
            transition: color 0.3s; display: flex; align-items: center; gap: 5px;
        }
        .back-btn:hover { color: #d92027; }

        /* --- LAYAR BESAR (HERO SECTION KHUSUS VIDEO) --- */
        .hero-showcase {
            height: 75vh; background-size: cover; background-position: center;
            position: relative; display: flex; align-items: flex-end; padding: 50px 5%;
            transition: background-image 0.3s ease-in-out; 
            background-image: url('Galery-Foto/competition/Foto-competition-cover1.jpg'); 
        }
        .hero-showcase::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, #0f1115 0%, rgba(15,17,21,0.5) 50%, transparent 100%);
            z-index: 1;
        }
        .hero-content { position: relative; z-index: 2; max-width: 800px; }
        .kategori-tag {
            background-color: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 20px; 
            font-size: 0.8rem; font-weight: 700; display: inline-block; margin-bottom: 15px; letter-spacing: 1px;
        }
        .hero-title { font-size: 4rem; font-weight: 800; margin: 0 0 10px 0; text-transform: uppercase; text-shadow: 2px 2px 10px rgba(0,0,0,0.8);}
        .hero-desc { font-size: 1.1rem; color: #ddd; margin-bottom: 30px; line-height: 1.6; text-shadow: 1px 1px 5px rgba(0,0,0,0.8);}
        
        .play-btn {
            background-color: white; color: black; font-weight: 800; font-size: 1.2rem;
            padding: 15px 40px; border: none; border-radius: 5px; cursor: pointer;
            display: flex; align-items: center; gap: 10px; transition: 0.3s;
        }
        .play-btn:hover { background-color: #d92027; color: white; transform: scale(1.05); }

        /* --- BAGIAN 1: SLIDER COVER VIDEO (SAMPING) --- */
        .thumbnail-section {
            padding: 20px 5% 40px 5%; position: relative; z-index: 5;
        }
        .section-atas { margin-top: -50px; } 
        .thumbnail-section h3 { font-size: 1.2rem; margin-bottom: 20px; letter-spacing: 1px; color: #fff;}
        .thumbnail-section h3 span { font-size: 0.8rem; color: #888; font-weight: 400; margin-left: 10px; }

        .row-geser {
            display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px;
            scroll-behavior: smooth; scrollbar-width: none; flex-wrap: nowrap;
        }
        .row-geser::-webkit-scrollbar { display: none; }

        .video-card {
            flex: 0 0 auto; width: 220px; height: 130px; border-radius: 8px; overflow: hidden; 
            cursor: pointer; position: relative; transition: 0.3s; border: 2px solid transparent;
        }
        .video-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .video-card:hover { transform: scale(1.05); z-index: 10; }
        .video-card.active { border: 3px solid white; transform: scale(1.05); z-index: 10; }
        .video-card.active img { opacity: 0.7; }

        /* --- BAGIAN 2: MASONRY GALLERY (PINTEREST STYLE) --- */
        .masonry-gallery {
            column-count: 4; 
            column-gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .photo-box {
            break-inside: avoid; 
            margin-bottom: 15px;
            border-radius: 8px; overflow: hidden; cursor: pointer; position: relative;
        }
        .photo-box img { 
            width: 100%; height: auto; display: block; transition: transform 0.4s ease, filter 0.4s ease; 
        }
        .photo-box:hover img { transform: scale(1.05); filter: brightness(0.7); }

        /* --- POPUP PEMUTAR VIDEO YOUTUBE --- */
        .video-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.95); z-index: 1000; display: none; 
            justify-content: center; align-items: center;
        }
        .video-content { width: 90%; max-width: 1000px; position: relative; }
        
        #player {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 10px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            background-color: black;
        }

        /* --- POPUP PEMBESAR FOTO (LIGHTBOX) --- */
        .photo-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.95); z-index: 1000; display: none; 
            justify-content: center; align-items: center;
        }
        
        .modal-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            color: white; font-size: 3rem; font-weight: bold; cursor: pointer;
            user-select: none; transition: color 0.3s; z-index: 1001; padding: 20px; 
            text-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }
        .modal-nav:hover { color: #d92027; }
        .left-nav { left: 30px; }
        .right-nav { right: 30px; }

        .photo-modal img {
            max-width: 80%; max-height: 90vh; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            object-fit: contain; transition: opacity 0.3s ease; 
        }

        .close-btn {
            position: absolute; top: 20px; right: 40px; color: white; font-size: 2.5rem;
            cursor: pointer; font-weight: bold; transition: 0.3s; z-index: 1002;
        }
        .close-btn:hover { color: #d92027; }

        /* ========================================================
           PENGATURAN KHUSUS HP & TABLET (DISAMAKAN SEMUA HALAMAN)
           ======================================================== */
        @media (max-width: 1024px) {
            .masonry-gallery { column-count: 3; } 
        }
        
        @media (max-width: 768px) {
            .nav-header { padding: 15px 5%; }
            .logo { font-size: 1.2rem; }

            .hero-showcase { 
                height: 60vh; 
                padding-bottom: 50px; 
                justify-content: flex-start; /* Rata Kiri */
            }
            .hero-content { 
                text-align: left; 
                display: flex; 
                flex-direction: column; 
                align-items: flex-start; 
                width: 100%;
            }
            
            .kategori-tag { font-size: 0.65rem; padding: 5px 15px; margin-bottom: 12px; }
            
            /* Anti Teks Terpotong */
            .hero-title { 
                font-size: 1.6rem; 
                line-height: 1.2;  
                margin-bottom: 12px;
                text-align: left; 
                word-wrap: break-word; 
                overflow-wrap: break-word; 
            }
            .hero-desc { font-size: 0.85rem; margin-bottom: 25px; line-height: 1.5; text-align: left; }
            
            .play-btn { font-size: 0.95rem; padding: 12px 35px; border-radius: 25px; } 

            .section-atas { margin-top: -40px; } 
            .thumbnail-section { padding: 10px 5% 30px 5%; }
            .thumbnail-section h3 { font-size: 1.1rem; margin-bottom: 15px; text-align: left; }
            
            .thumbnail-section h3 span { display: block; margin-left: 0; margin-top: 5px; font-size: 0.75rem; } 
            
            /* Cover Video Mengecil */
            .video-card { 
                width: 110px; 
                height: 65px; 
                border-radius: 6px; 
            } 
            .row-geser { gap: 8px; padding-bottom: 10px; }

            /* Galeri 3 Kolom */
            .masonry-gallery { column-count: 3; column-gap: 5px; } 
            .photo-box { margin-bottom: 5px; border-radius: 5px; } 
            
            .modal-nav { font-size: 2rem; padding: 10px; }
            .left-nav { left: 5px; }
            .right-nav { right: 5px; }
            .photo-modal img { max-width: 90%; }
            .close-btn { top: 10px; right: 15px; font-size: 2rem;}
        }
    </style>
</head>
<body>

    <header class="nav-header">
        <div class="logo"></div>
        <a href="index.html" class="back-btn">&#8592; KEMBALI</a>
    </header>

    <section class="hero-showcase" id="main-display">
        <div class="hero-content">
            <div class="kategori-tag">COMPETITION VIDEO</div>
            <h1 class="hero-title" id="display-title">Competition Highlights 1</h1>
            <p class="hero-desc" id="display-desc">Video dokumentasi utama dari ajang kompetisi ini.</p>
            <button class="play-btn" id="play-btn">&#9658; Play Now</button>
        </div>
    </section>

    <section class="thumbnail-section section-atas">
        <h3>Video Documentation <span>(Geser &#8596;)</span></h3>
        <div class="row-geser">
            
            <div class="video-card active" data-image="Galery-Foto/competition/Foto-competition-cover1.jpg" data-video="https://www.youtube.com/embed/vZilOdiUutU" data-title="Juara 1 Promosi Kuliner Kota Bogor" data-desc="Juara 1 Video Promosi Kuliner yang diadakan Oleh Gojeg x Disparbud Kota Bogor">
                <img src="Galery-Foto/competition/Foto-competition-cover1.jpg" alt="Cover Video 1">
            </div>
            
            <div class="video-card" data-image="Galery-Foto/competition/Foto-competition-cover2.jpg" data-video="https://www.youtube.com/embed/e0jkaK_KqOs" data-title="Juara 1 Promosi Wisata Kota Bogor" data-desc="Juara 1 Video Promosi Wisata yang diadakan oleh Disparbud Kota Bogor">
                <img src="Galery-Foto/competition/Foto-competition-cover2.jpg" alt="Cover Video 2">
            </div>
            
            <div class="video-card" data-image="Galery-Foto/competition/Foto-competition-cover3.jpg" data-video="https://www.youtube.com/embed/4IfPl-I2N0U" data-title="Juara 2 Promosi Wisata Kota Bogor" data-desc="Juara 2 Video Promosi Wisata yang diadakan oleh Disparbud Kota Bogor">
                <img src="Galery-Foto/competition/Foto-competition-cover3.jpg" alt="Cover Video 3">
            </div>
            
            <div class="video-card" data-image="Galery-Foto/competition/Foto-competition-cover4.jpg" data-video="https://www.youtube.com/embed/hLaI5K8nq6o" data-title="Juara 1 Bogor Street Fest Capgomeh" data-desc="Juara 1 Video yang diadakan oleh Pemkot Bogor">
                <img src="Galery-Foto/competition/Foto-competition-cover4.jpg" alt="Cover Video 4">
            </div>

        </div>
    </section>

    <section class="thumbnail-section">
        <h3>Galeri Foto Competition</h3>
        <div class="masonry-gallery">
            
            <div class="photo-box"><img src="Galery-Foto/competition/Foto-competition1.jpg" alt="Foto Competition 1"></div>
            <div class="photo-box"><img src="Galery-Foto/competition/Foto-competition2.jpg" alt="Foto Competition 2"></div>
            <div class="photo-box"><img src="Galery-Foto/competition/Foto-competition3.jpg" alt="Foto Competition 3"></div>
            <div class="photo-box"><img src="Galery-Foto/competition/Foto-competition4.jpg" alt="Foto Competition 4"></div>
            <div class="photo-box"><img src="Galery-Foto/competition/Foto-competition5.jpg" alt="Foto Competition 5"></div>
            <div class="photo-box"><img src="Galery-Foto/competition/Foto-competition6.jpg" alt="Foto Competition 6"></div>
            <div class="photo-box"><img src="Galery-Foto/competition/Foto-competition7.jpg" alt="Foto Competition 7"></div>
            <div class="photo-box"><img src="Galery-Foto/competition/Foto-competition8.jpg" alt="Foto Competition 8"></div>
            
        </div>
    </section>

    <div class="video-modal" id="video-modal">
        <div class="video-content">
            <span class="close-btn" id="close-video-modal" style="top:-40px; right:0;">&times;</span>
            <iframe id="player" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
        </div>
    </div>

    <div class="photo-modal" id="photo-modal">
        <span class="close-btn" id="close-photo-modal">&times;</span>
        <span class="modal-nav left-nav" id="prev-photo">&#10094;</span> 
        <img src="" id="photo-modal-img" alt="Foto Diperbesar">
        <span class="modal-nav right-nav" id="next-photo">&#10095;</span> 
    </div>

    <script>
        // 1. MESIN UNTUK SLIDER VIDEO YOUTUBE & HERO DISPLAY
        const mainDisplay = document.getElementById('main-display');
        const displayTitle = document.getElementById('display-title');
        const displayDesc = document.getElementById('display-desc');
        const videoCards = document.querySelectorAll('.video-card');
        
        const playBtn = document.getElementById('play-btn');
        const videoModal = document.getElementById('video-modal');
        const closeVideoModalBtn = document.getElementById('close-video-modal');
        const player = document.getElementById('player');

        // Link pertama agar tidak kosong
        let currentVideoSrc = "https://www.youtube.com/embed/vZilOdiUutU";
        let currentVideoIndex = 0;
        const totalVideos = videoCards.length;

        // Fungsi pusat untuk mengganti video (Dipakai saat klik ATAU swipe)
        function gantiVideoUtama(index) {
            document.querySelector('.video-card.active').classList.remove('active');
            const cardBaru = videoCards[index];
            cardBaru.classList.add('active');

            mainDisplay.style.backgroundImage = `url('${cardBaru.getAttribute('data-image')}')`;
            displayTitle.textContent = cardBaru.getAttribute('data-title');
            displayDesc.textContent = cardBaru.getAttribute('data-desc');
            currentVideoSrc = cardBaru.getAttribute('data-video');

            // Menggulir deretan thumbnail otomatis agar sinkron
            cardBaru.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }

        // Event saat kotak kecil (thumbnail) diklik
        videoCards.forEach((card, index) => {
            card.addEventListener('click', function() {
                if (this.classList.contains('active')) return;
                currentVideoIndex = index;
                gantiVideoUtama(currentVideoIndex);
                window.scrollTo({ top: 0, behavior: 'smooth' }); 
            });
        });

        // MESIN BARU: SWIPE UNTUK GAMBAR UTAMA HERO (KHUSUS MOBILE)
        let heroTouchStart = 0;
        let heroTouchEnd = 0;

        mainDisplay.addEventListener('touchstart', function(event) {
            heroTouchStart = event.changedTouches[0].screenX;
        }, {passive: true});

        mainDisplay.addEventListener('touchend', function(event) {
            heroTouchEnd = event.changedTouches[0].screenX;
            handleHeroSwipe();
        }, {passive: true});

        function handleHeroSwipe() {
            const jarakMinimal = 50;
            const jarakGeser = heroTouchStart - heroTouchEnd;

            // Pastikan ada lebih dari 1 video untuk bisa digeser
            if (totalVideos > 1) {
                if (jarakGeser > jarakMinimal) {
                    // Geser ke Kiri (Next)
                    currentVideoIndex = (currentVideoIndex + 1) % totalVideos;
                    gantiVideoUtama(currentVideoIndex);
                } else if (jarakGeser < -jarakMinimal) {
                    // Geser ke Kanan (Prev)
                    currentVideoIndex = (currentVideoIndex - 1 + totalVideos) % totalVideos;
                    gantiVideoUtama(currentVideoIndex);
                }
            }
        }

        // Memutar video YouTube saat klik Play
        playBtn.addEventListener('click', () => {
            if(currentVideoSrc) {
                player.src = currentVideoSrc + "?autoplay=1"; 
                videoModal.style.display = 'flex'; 
            }
        });

        // Mematikan video YouTube saat ditutup
        closeVideoModalBtn.addEventListener('click', () => {
            videoModal.style.display = 'none';
            player.src = ""; 
        });

        // 2. MESIN BARU UNTUK LIGHTBOX GALERI FOTO (BISA DIGESER < > )
        const photoBoxes = document.querySelectorAll('.photo-box img'); 
        const photoModal = document.getElementById('photo-modal');
        const photoModalImg = document.getElementById('photo-modal-img');
        const closePhotoModalBtn = document.getElementById('close-photo-modal');
        
        const prevBtn = document.getElementById('prev-photo');
        const nextBtn = document.getElementById('next-photo');
        
        let currentPhotoIndex = 0; 

        photoBoxes.forEach((img, index) => {
            img.parentElement.addEventListener('click', function() {
                currentPhotoIndex = index; 
                photoModalImg.src = img.src; 
                photoModal.style.display = 'flex'; 
            });
        });

        function gantiFoto(index) {
            if (index < 0) {
                currentPhotoIndex = photoBoxes.length - 1; 
            } else if (index >= photoBoxes.length) {
                currentPhotoIndex = 0; 
            } else {
                currentPhotoIndex = index;
            }
            
            photoModalImg.style.opacity = 0.5;
            setTimeout(() => {
                photoModalImg.src = photoBoxes[currentPhotoIndex].src;
                photoModalImg.style.opacity = 1;
            }, 150);
        }

        nextBtn.addEventListener('click', (e) => {
            e.stopPropagation(); 
            gantiFoto(currentPhotoIndex + 1);
        });

        prevBtn.addEventListener('click', (e) => {
            e.stopPropagation(); 
            gantiFoto(currentPhotoIndex - 1);
        });

        document.addEventListener('keydown', (e) => {
            if (photoModal.style.display === 'flex') { 
                if (e.key === 'ArrowRight') gantiFoto(currentPhotoIndex + 1);
                if (e.key === 'ArrowLeft') gantiFoto(currentPhotoIndex - 1);
                if (e.key === 'Escape') photoModal.style.display = 'none'; 
            }
        });

        closePhotoModalBtn.addEventListener('click', () => {
            photoModal.style.display = 'none';
        });

        window.addEventListener('click', (e) => {
            if(e.target === videoModal) {
                videoModal.style.display = 'none';
                player.src = ""; // Matikan suara YouTube
            }
            if(e.target === photoModal) {
                photoModal.style.display = 'none';
            }
        });

        // 3. MESIN SENSOR GESER (SWIPE) UNTUK GALERI FOTO BAWAH
        let sentuhanAwalFoto = 0;
        let sentuhanAkhirFoto = 0;

        photoModal.addEventListener('touchstart', function(event) {
            sentuhanAwalFoto = event.changedTouches[0].screenX;
        }, {passive: true});

        photoModal.addEventListener('touchend', function(event) {
            sentuhanAkhirFoto = event.changedTouches[0].screenX;
            prosesGeserFoto();
        }, {passive: true});

        function prosesGeserFoto() {
            const jarakMinimal = 50; 
            const jarakGeser = sentuhanAwalFoto - sentuhanAkhirFoto;

            if (jarakGeser > jarakMinimal) {
                gantiFoto(currentPhotoIndex + 1);
            } else if (jarakGeser < -jarakMinimal) {
                gantiFoto(currentPhotoIndex - 1);
            }
        }
    </script>
</body>
</html>
